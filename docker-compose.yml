services:
  betwfriends:
    build: .
    ports:
      - "3000:3000"
    environment:
      # The backend runs on Convex — point the frontend at your deployment.
      NEXT_PUBLIC_CONVEX_URL: "${NEXT_PUBLIC_CONVEX_URL:-https://your-deployment.convex.cloud}"
      PAYMENT_MODE: "${PAYMENT_MODE:-mock}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      # For live Stripe payments, set these as Convex env vars instead:
      # STRIPE_SECRET_KEY / STRIPE_PUBLISHABLE_KEY / STRIPE_WEBHOOK_SECRET
    restart: unless-stopped
